name: Windows CMake + vcpkg

# Builds xLights with CMake + vcpkg (XLIGHTS_USE_VCPKG=ON).
# Uses manifest mode with ci_scripts/vcpkg.json (CI-safe FFmpeg features — no CUDA/OpenCL/QSV).
# cmake runs `vcpkg install` during configure; the installed tree is cached in
# actions/cache so subsequent runs skip compilation entirely on a cache hit.
# sccache caches compiled xLights object files across runs.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cmake-vcpkg:
    name: CMake / vcpkg / Windows x64
    runs-on: windows-latest

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      BUILD_DIR: cmake_vs_vcpkg
      SCCACHE_GHA_ENABLED: "true"
      # Tells vcpkg to use GitHub Actions cache as its binary package store.
      # Individual packages are keyed by content hash so a vcpkg.json change
      # only rebuilds the packages that actually changed.
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # ── MSVC ──────────────────────────────────────────────────────────────
      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── ISPC ──────────────────────────────────────────────────────────────
      - name: Install ISPC
        uses: ispc/install-ispc-action@main
        with:
          version: 1.30.0

      # ── sccache ───────────────────────────────────────────────────────────
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache
        shell: bash
        run: |
          if ! sccache --zero-stats; then
            echo "::warning::sccache GHA backend unavailable; falling back to local disk"
            echo "SCCACHE_GHA_ENABLED=" >> "$GITHUB_ENV"
            sccache --stop-server 2>/dev/null || true
          fi

      - name: Create sccache cl.bat shim
        shell: pwsh
        run: |
          $dir = "${{ runner.temp }}\sccache-wrapper"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          @'
          @echo off
          sccache.exe cl.exe %* 2>&1
          set RC=%ERRORLEVEL%
          if not "%RC%"=="0" echo cl.bat FAILED (rc=%RC%) args: %* 1>&2
          exit /b %RC%
          '@ | Set-Content -Encoding Ascii "$dir\cl.bat"
          "SCCACHE_WRAPPER_DIR=$dir" | Out-File $env:GITHUB_ENV -Append

      # ── vcpkg bootstrap ───────────────────────────────────────────────────
      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $vcpkg = "C:\vcpkg"
          if (-not (Test-Path "$vcpkg\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg $vcpkg --depth 1
          }
          & "$vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=$vcpkg" | Out-File $env:GITHUB_ENV -Append

      # ── vcpkg binary cache (GitHub Actions backend) ───────────────────────
      # Export the GHA cache service token so vcpkg's x-gha backend can
      # read and write the binary package cache.  Each package is stored by
      # its own content hash, so changing one dependency in vcpkg.json only
      # re-downloads/re-builds the packages that actually changed.
      - name: Expose GHA cache credentials for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',   process.env.ACTIONS_CACHE_URL   || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ── wxWidgets ─────────────────────────────────────────────────────────
      - name: Get wxWidgets HEAD SHA
        id: wx-sha
        shell: bash
        run: |
          sha=$(git ls-remote https://github.com/xLightsSequencer/wxWidgets.git HEAD \
                | cut -f1 | head -c 12)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Cache wxWidgets
        id: cache-wx
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\wxWidgets
          key: wxwidgets-msvc2022-x64-vcpkg-${{ steps.wx-sha.outputs.sha }}

      - name: Checkout wxWidgets
        if: steps.cache-wx.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: xLightsSequencer/wxWidgets
          path: wxWidgets
          submodules: recursive

      - name: Build wxWidgets (Release)
        if: steps.cache-wx.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}\wxWidgets
        run: msbuild /m .\build\msw\wx_vc17.sln /p:Configuration="Release" /p:Platform="x64"

      # ── Configure ─────────────────────────────────────────────────────────
      # VCPKG_MANIFEST_DIR points cmake at ci_scripts/vcpkg.json (CI-safe features).
      # cmake runs vcpkg install into %BUILD_DIR%\vcpkg_installed\ — which is
      # exactly where _VCPKG_INSTALLED_DIR resolves, so find_path/find_library
      # in CMakeLists.txt find the headers and libs without extra hints.
      - name: Configure CMake
        shell: cmd
        run: |
          cmake -S . -B %BUILD_DIR% ^
            -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows ^
            -DVCPKG_MANIFEST_DIR=%CD%\ci_scripts ^
            -DXLIGHTS_USE_VCPKG=ON ^
            -DwxWidgets_ROOT_DIR=${{ github.workspace }}\wxWidgets

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        shell: cmd
        run: |
          cmake --build %BUILD_DIR% --config Release --parallel 8 ^
            -- ^
            /p:CLToolExe=cl.bat ^
            /p:CLToolPath=%SCCACHE_WRAPPER_DIR% ^
            /p:TrackFileAccess=false ^
            /p:UseMultiToolTask=true

      - name: sccache stats
        run: sccache --show-stats

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload xLights exe
        uses: actions/upload-artifact@v4
        with:
          name: xLights_vcpkg_exe
          path: bin\Release\**
          retention-days: 7
