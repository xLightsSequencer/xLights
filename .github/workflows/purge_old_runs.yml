name: Purge old workflow runs

# Fork-only maintenance job: deletes old workflow runs to keep the Actions
# history/storage tidy. Guarded by the repository check below so this never
# does anything if the workflow file is ever merged upstream.
on:
  schedule:
    - cron: '17 6 * * 0'  # weekly, Sunday 06:17 UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Delete completed runs older than this many days'
        required: false
        default: '30'
      keep_minimum_runs:
        description: 'Always keep at least this many runs per workflow'
        required: false
        default: '10'

jobs:
  purge:
    if: github.repository == 'derwin12/xLights'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: ${{ github.event.inputs.days || '30' }}
          keep_minimum_runs: ${{ github.event.inputs.keep_minimum_runs || '10' }}
