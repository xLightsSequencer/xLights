name: Ubuntu CI

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '.github/workflows/*.yml'
      - '.github/ISSUE_TEMPLATE/*.md'
      - 'build_scripts/**'
      - 'ci_scripts/**'
      - 'cmudict/**'
      - 'documentation/**'
      - 'download/**'
      - 'resources/**'
      - 'lib/windows/**'
      - 'lib/windows64/**'
      - 'songs/**'
      - 'TipOfDay/**'
      - 'xlDo/**'
      - '*.md'
      - '*.yml'
      - '*.txt'
      - '*.docx'
      - 'README.*'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '.github/workflows/*.yml'
      - '.github/ISSUE_TEMPLATE/*.md'
      - 'build_scripts/**'
      - 'ci_scripts/**'
      - 'cmudict/**'
      - 'documentation/**'
      - 'download/**'
      - 'resources/**'
      - 'songs/**'
      - 'TipOfDay/**'
      - 'xlDo/**'
      - '*.md'
      - '*.yml'
      - '*.txt'
      - '*.docx'
      - 'README.*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-24.04

    container:
      image: ghcr.io/xlightssequencer/xlights-build-docker:master

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
    - uses: actions/checkout@v4
      with:
          submodules: 'true'

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-ubuntu-${{ github.sha }}
        restore-keys: |
          ccache-ubuntu-

    - name: Configure ccache
      run: |
        ccache --max-size=2G
        ccache --set-config=compression=true
        ccache --zero-stats

    - name: Make
      run: PATH=/usr/lib/ccache:$PATH make -j $(nproc)

    - name: ccache stats
      run: ccache --show-stats
