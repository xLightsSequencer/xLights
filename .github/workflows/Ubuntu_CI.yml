name: Ubuntu CI

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-24.04

    container:
      image: ghcr.io/xlightssequencer/xlights-build-docker:master

    steps:
    - uses: actions/checkout@v4
      with:
          submodules: 'true'
    - name: Make
      run: make -j $(nproc)
